x-volumes: &default-volumes
  volumes:
    - ./nginx/html/index.html:/app/index.html
    - ./dist:/app/dist
    - ./js:/app/js
    - ./scss:/app/scss
    - ./webpack.config.js:/app/webpack.config.js
    - ./babel.config.js:/app/babel.config.js
    - ./spec:/app/spec

services:
  compile:
    build: .
    image: statuspage-embed
    entrypoint: ["npm", "run"]
    #<<: *default-volumes

  watch:
    build: .
    image: statuspage-embed
    command: ["npm", "run", "build:dev:watch"]
    <<: *default-volumes

  test:
    build: .
    image: statuspage-embed
    command:
      - /bin/sh
      - -c
      - |
        npm run build:dev
        npm run test
        #<<: *default-volumes

