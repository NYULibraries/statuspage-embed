x-volumes: &default-volumes
  volumes:
    - ./dist:/app/dist
    - ./src:/app/src
    - ./public:/app/public
    - ./spec:/app/spec

services:
  compile:
    build: .
    image: statuspage-embed
    entrypoint: ["npm", "run"]
    #<<: *default-volumes

  watch:
    build: .
    image: statuspage-embed
    command: ["npm", "run", "build:dev:watch"]
    <<: *default-volumes

  test:
    build: .
    image: statuspage-embed
    command:
      - /bin/sh
      - -c
      - |
        npm run build:dev
        npm run test
        #<<: *default-volumes

  dev:
    build:
      dockerfile: Dockerfile.dev-server
    image: statuspage-embed-dev-server
    ports:
      - "3000:3000"
    depends_on:
      - watch
    <<: *default-volumes

