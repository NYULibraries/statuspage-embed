x-volumes: &default-volumes
  volumes:
    - ./dist:/app/dist
    - ./src:/app/src
    - ./public:/app/public
    - ./spec:/app/spec

services:
  compile:
    build: .
    image: statuspage-embed
    entrypoint: ["npm", "run"]
    #<<: *default-volumes

  dev:
    build:
      dockerfile: Dockerfile.development
    image: statuspage-embed
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev"]
    <<: *default-volumes

  test:
    build: .
    image: statuspage-embed
    command:
      - /bin/sh
      - -c
      - |
        npm run test
        #<<: *default-volumes
